spring.application.name=manager-cep1
server.servlet.context-path=/manager-cep1
logging.level.org.springframework.web=DEBUG

spring.datasource.url=jdbc:postgresql://localhost:5432/managercep
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
	
# usando em variaveis de ambiente
spring.datasource.username=${DB_USER:dev}
spring.datasource.password=${DB_PASS:dev}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG