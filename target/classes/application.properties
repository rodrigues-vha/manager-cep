spring.application.name=manager-cep1
server.servlet.context-path=/manager-cep1
logging.level.org.springframework.web=DEBUG

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/managercep}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:local}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:local}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG